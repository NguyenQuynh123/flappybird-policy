<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">

    <title>Cocos Creator | FlappyBird</title>

    <meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="full-screen" content="yes"/>
    <meta name="screen-orientation" content="portrait"/>
    <meta name="x5-fullscreen" content="true"/>
    <meta name="360-fullscreen" content="true"/>

    <meta name="renderer" content="webkit"/>
    <meta name="force-rendering" content="webkit"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>

    <link rel="stylesheet" type="text/css" href="./style.css"/>
    <link rel="icon" href="favicon.ico"/>
  </head>
  <body>
    <h1 class="header">FlappyBird</h1>

    <div id="GameDiv" cc_exact_fit_screen="false" style="width: 1280px; height: 960px;">
      <div id="Cocos3dGameContainer">
        <canvas id="GameCanvas" width="1280" height="960" tabindex="99"></canvas>
      </div>
    </div>
    <p class="footer">
      Created with <a href="https://www.cocos.com/products" title="Cocos Creator">Cocos Creator</a>
    </p>
    <!-- Polyfills bundle. -->

<script src="src/polyfills.bundle.js" charset="utf-8"> </script>    


<!-- SystemJS support. -->
<script src="src/system.bundle.js" charset="utf-8"> </script>

<!-- Import map -->
<script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"> </script>

<script>
    System.import('./index.js').catch(function(err) { console.error(err); })
</script>
    <!-- Blink detection: load after Cocos + game scripts expose window.GameEventBus (see assets/scripts/EventBus.ts). -->
    <script>
    (function () {
      var BLINK_FACE_MESH_CDN = 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js';

      function loadScript(src) {
        return new Promise(function (resolve, reject) {
          var s = document.createElement('script');
          s.src = src;
          s.crossOrigin = 'anonymous';
          s.async = true;
          s.onload = function () { resolve(); };
          s.onerror = function () { reject(new Error('Failed to load script: ' + src)); };
          document.body.appendChild(s);
        });
      }

      function waitForGameEventBus(onReady) {
        var attempts = 0;
        var maxAttempts = 600;
        var id = window.setInterval(function () {
          attempts += 1;
          if (window.GameEventBus && typeof window.GameEventBus.emit === 'function') {
            window.clearInterval(id);
            onReady();
            return;
          }
          if (attempts >= maxAttempts) {
            window.clearInterval(id);
            console.warn('[blink] Timeout waiting for window.GameEventBus — blink scripts not started.');
          }
        }, 50);
      }

      function startBlinkDetector() {
        if (window.__blinkBootstrapStarted) {
          return;
        }
        window.__blinkBootstrapStarted = true;
        loadScript(BLINK_FACE_MESH_CDN)
          .then(function () { return loadScript('./blink.js'); })
          .then(function () {
            if (window.BlinkDetector && typeof window.BlinkDetector.start === 'function') {
              window.BlinkDetector.start();
            }
          })
          .catch(function (e) {
            console.warn('[blink] Failed to initialize:', e);
          });
      }

      waitForGameEventBus(startBlinkDetector);
    })();
    </script>
  </body>
</html>
